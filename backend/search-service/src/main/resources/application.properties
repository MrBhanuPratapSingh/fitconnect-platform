server.port=8087

spring.application.name=search-service

# URLs of the services this aggregator calls.
# Once the API Gateway exists, these will point through it instead of directly.
services.gym-service.url=http://localhost:8082
services.review-service.url=http://localhost:8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true